<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>北京地铁韧性动态监测系统</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>北京地铁韧性动态监测系统</h1>
      <div class="subinfo">真实OD回放 · 10分钟粒度 · 动态监测面板</div>
    </div>

    <div class="actions">
      <div id="playbackTime" class="playback-time">回放时间：--</div>
      <button id="cleanBtn">数据清洗+训练</button>
      <button id="refreshBtn">下一时刻</button>
      <button id="pausePlayBtn">暂停</button>
      <button id="windBtn">大风模式：关</button>
      <select id="modelSelect">
        <option value="lightgbm">LightGBM</option>
        <option value="xgboost">XGBoost</option>
        <option value="baseline">Baseline</option>
      </select>
    </div>
  </header>

  <main class="layout">
    <aside class="panel left-panel">
      <div class="panel-title">◆ 核心指标</div>
      <div id="kpis"></div>

      <div class="panel-title mt16">◆ 高风险站点 Top5</div>
      <div id="topStations"></div>
    </aside>

    <section class="center-panel">
      <div class="map-shell">
        <div class="map-header">
          <div class="map-title">地铁网络态势</div>
          <div class="map-legend">
            <span><i class="dot normal"></i>正常</span>
            <span><i class="dot crowded"></i>拥堵</span>
            <span><i class="dot vulnerable"></i>脆弱</span>
            <span><i class="dot fault"></i>严重拥堵</span>
          </div>
        </div>
        <div id="map"></div>
      </div>
    </section>

    <aside class="panel right-panel">
      <div class="panel-title">◆ 动态趋势监控</div>
      <div id="trendChart" class="chart-box"></div>
      <div id="flowChart" class="chart-box"></div>

      <div class="panel-title mt16">◆ 状态分布</div>
      <div id="statusPie" class="chart-box pie-box"></div>

      <div class="panel-title alert-title mt16">◆ 当前告警</div>
      <div id="alertList"></div>
    </aside>
  </main>

  <script src="/app.js"></script>
</body>
</html>
